services:
  postgres:
    image: postgres:16-alpine
    container_name: nasa-fan-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nasa_fan
    volumes:
      - nasa_fan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nasa_fan"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nasa_fan_pgdata:
