databases:
  - name: nasa-fan-db
    plan: free
    databaseName: nasa_fan

services:
  - type: web
    name: nasa-fan-api
    runtime: node
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nasa-fan-db
          property: connectionString
